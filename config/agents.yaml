# Runtime config reference:
# - llm.default_provider: agent 未指定 provider 时使用的默认供应商。
# - llm.timeout_seconds: 每次模型 HTTP 请求的超时时间，单位秒。
# - llm.retry_times: 模型请求遇到超时、网络错误、429/5xx 时的最大尝试次数。
# - providers.<name>.model_name: 某个供应商默认使用的模型名；agent.model_name 会覆盖它。
# - providers.<name>.base_url: OpenAI-compatible chat completions 根地址，不包含 /chat/completions。
# - agents.<agent>.provider: 单个 agent 使用的供应商；未写时回退到 llm.default_provider。
# - agents.<agent>.model_name: 单个 agent 使用的模型名；未写时回退到 providers.<provider>.model_name。
# - agents.<agent>.temperature: 普通 JSON 模型调用温度，范围 0-2。
# - agents.<agent>.tool_temperature: 工具调用前的模型决策温度；当前由 expert_a/expert_b 使用。
# - agents.<agent>.integration_temperature: 专家 A 最终整合稿温度；当前只由 expert_a 使用。
# - agents.<agent>.top_k: 默认检索片段数，范围 1-10；当前由 expert_a/expert_b 和 chat_answer 使用。
# API keys still live in .env: DEEPSEEK_API_KEY, QWEN_API_KEY, GLM_API_KEY.

llm:
  default_provider: deepseek
  timeout_seconds: 300
  retry_times: 1

providers:
  deepseek:
    model_name: deepseek-v4-flash
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  qwen:
    model_name: qwen3.7-plus
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  glm:
    model_name: glm-5.2
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1

agents:
  route:
    provider: deepseek
    temperature: 0.0
  diagnosis_feedback:
    provider: qwen
    temperature: 0.5
  expert_a:
    provider: deepseek
    temperature: 0.4
    tool_temperature: 0.2
    integration_temperature: 0.3
    top_k: 5
  expert_b:
    provider: qwen
    temperature: 0.7
    tool_temperature: 0.3
    top_k: 5
  judge:
    provider: qwen
    temperature: 0.0
  chat_answer:
    provider: qwen
    temperature: 0.3
    top_k: 5
